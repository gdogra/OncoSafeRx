[build]
  base = "."
  publish = "frontend/dist"
  command = "cd frontend && rm -rf node_modules/.cache && rm -rf dist && rm -f .env && echo 'VITE_API_URL=' > .env && echo 'VITE_SUPABASE_URL=https://emfrwckxctyarphjvfeu.supabase.co' >> .env && echo 'VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtZnJ3Y2t4Y3R5YXJwaGp2ZmV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwNjM2NjcsImV4cCI6MjA3MzYzOTY2N30.yYrhigcrMY82OkA4KPqSANtN5YgeA6xGH9fnrTe5k8c' >> .env && echo 'VITE_DISABLE_SAMPLE_PATIENTS=true' >> .env && echo 'VITE_SCIENTIST_MODE=true' >> .env && echo 'VITE_ENABLE_MARKETING=false' >> .env && echo 'VITE_ANALYTICS_ENABLED=true' >> .env && echo 'VITE_APP_NAME=OncoSafeRx' >> .env && npm install --legacy-peer-deps && npm run build && cd .. && ls frontend/dist/index.html"

[build.environment]
  NODE_VERSION = "20.19.1"
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_OPTIONS = "--max-old-space-size=4096"
  GENERATE_SOURCEMAP = "false"
  CI = "false"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://emfrwckxctyarphjvfeu.supabase.co wss://emfrwckxctyarphjvfeu.supabase.co https://rxnav.nlm.nih.gov https://dailymed.nlm.nih.gov https://api.fda.gov https://clinicaltrials.gov https://clinicaltrialsapi.cancer.gov https://nominatim.openstreetmap.org https://data.medicaid.gov; worker-src 'self' blob:; frame-ancestors 'none'; object-src 'none'"

[context.production.environment]
  VITE_API_URL = ""
  VITE_SUPABASE_URL = "https://emfrwckxctyarphjvfeu.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtZnJ3Y2t4Y3R5YXJwaGp2ZmV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwNjM2NjcsImV4cCI6MjA3MzYzOTY2N30.yYrhigcrMY82OkA4KPqSANtN5YgeA6xGH9fnrTe5k8c"
  VITE_APP_VERSION = "21.0.0"
  VITE_ALLOW_PUBLIC_READ = "true"
  VITE_APP_NAME = "OncoSafeRx"
  NETLIFY = "true"
